<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" fill="none">
  <defs>
    <radialGradient id="bg" cx="62%" cy="42%" r="75%">
      <stop offset="0%" stop-color="#111a3e"/>
      <stop offset="45%" stop-color="#070c22"/>
      <stop offset="100%" stop-color="#02030a"/>
    </radialGradient>
    <radialGradient id="glow" cx="50%" cy="45%" r="55%">
      <stop offset="0%" stop-color="#ffd98f" stop-opacity="0.55"/>
      <stop offset="60%" stop-color="#d8b56d" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#d8b56d" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f4dfae"/>
      <stop offset="55%" stop-color="#d8b56d"/>
      <stop offset="100%" stop-color="#b28d4d"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- estrelas de fundo -->
  <g fill="#cfe0ff">
    <circle cx="120" cy="90" r="1.6" opacity=".7"/><circle cx="260" cy="180" r="1.1" opacity=".5"/>
    <circle cx="80" cy="320" r="1.4" opacity=".6"/><circle cx="190" cy="470" r="1.2" opacity=".5"/>
    <circle cx="340" cy="540" r="1.5" opacity=".6"/><circle cx="1050" cy="120" r="1.3" opacity=".6"/>
    <circle cx="1130" cy="300" r="1.6" opacity=".7"/><circle cx="980" cy="470" r="1.2" opacity=".5"/>
    <circle cx="1090" cy="540" r="1.1" opacity=".5"/><circle cx="60" cy="560" r="1.2" opacity=".5"/>
  </g>

  <!-- naipe luminoso à direita -->
  <g transform="translate(830 300)">
    <circle r="240" fill="url(#glow)"/>
    <path transform="translate(-120 -150) scale(2.4)"
      d="M50 8 C50 8 18 40 18 62 C18 78 30 88 44 88 C46 88 48 87.6 50 87 C50 87 46 96 40 100 L60 100 C54 96 50 87 50 87 C52 87.6 54 88 56 88 C70 88 82 78 82 62 C82 40 50 8 50 8 Z"
      fill="url(#gold)"/>
    <g fill="#ffe9b8">
      <circle cx="0" cy="-120" r="5"/><circle cx="-40" cy="-40" r="4"/><circle cx="40" cy="-40" r="4"/>
      <circle cx="0" cy="-20" r="6"/><circle cx="-70" cy="30" r="3.5"/><circle cx="70" cy="30" r="3.5"/>
      <circle cx="0" cy="90" r="4"/>
    </g>
  </g>

  <!-- texto editorial à esquerda -->
  <g transform="translate(90 250)">
    <text x="0" y="0" fill="#d8b56d" font-family="Georgia, 'Times New Roman', serif" font-size="22" letter-spacing="7">SUPREMA · POKER ♠ SX ♦ BET ♣</text>
    <text x="-4" y="80" fill="#fbf7ee" font-family="Georgia, 'Times New Roman', serif" font-size="92">A</text>
    <text x="-4" y="170" fill="url(#gold)" font-family="Georgia, 'Times New Roman', serif" font-size="92" font-style="italic">Constelação</text>
    <text x="0" y="230" fill="#b9b3a6" font-family="Helvetica, Arial, sans-serif" font-size="24">O organograma vivo do Grupo Suprema —</text>
    <text x="0" y="264" fill="#b9b3a6" font-family="Helvetica, Arial, sans-serif" font-size="24">cada estrela é uma pessoa.</text>
  </g>
</svg>
